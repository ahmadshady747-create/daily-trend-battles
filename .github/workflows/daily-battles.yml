# =============================================================================
#  .github/workflows/daily-battles.yml
#  Daily Trend Battle Generator + OG Images + Twitter Auto-Post (Playwright)
# =============================================================================

name: Daily Battle Generator

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-battles:
    name: Generate Daily Trend Battles
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: daily-battle-generator
      cancel-in-progress: false

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Install Playwright browsers ─────────────────────────────────────
      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # ── 5. Run the battle generator ────────────────────────────────────────
      - name: Run main.py
        run: python main.py

      # ── 6. Generate OG images ──────────────────────────────────────────────
      - name: Generate OG images
        run: python og_generator.py

      # ── 7. Commit data.json + OG images ────────────────────────────────────
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add -f data.json public/og/
          git commit -m "chore: daily battle update $(date -u +'%Y-%m-%d')" || true
          git push origin HEAD || true

      # ── 8. Post to Twitter/X via Playwright ────────────────────────────────
      - name: Post to Twitter/X
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_PHONE:    ${{ secrets.TWITTER_PHONE }}
        run: python twitter_bot.py || true