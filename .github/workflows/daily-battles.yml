# =============================================================================
#  .github/workflows/daily-battles.yml
#  Daily Trend Battle Generator + OG + Discord + Telegram + SEO Sitemap
# =============================================================================

name: Daily Battle Generator

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-battles:
    name: Generate Daily Trend Battles
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: daily-battle-generator
      cancel-in-progress: false

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      # ── 3. Install system fonts for Pillow OG image generation ────────────
      - name: Install system fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            fonts-liberation

      # ── 4. Install Python dependencies ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Prepare output directories ─────────────────────────────────────
      - name: Prepare output directories
        run: |
          mkdir -p og
          touch og/.gitkeep

      # ── 6. Run the battle generator ────────────────────────────────────────
      - name: Run main.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MY_CHAT_ID: ${{ secrets.TELEGRAM_MY_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SITE_URL:            ${{ secrets.SITE_URL }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python main.py

      # ── 7. Commit data.json + OG images + sitemap.xml ─────────────────────
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add -f data.json og/ sitemap.xml
          git diff --staged --quiet \
            && echo "Nothing to commit — skipping." \
            || git commit -m "[skip ci] chore: daily battle update $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin HEAD
