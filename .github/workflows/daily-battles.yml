# =============================================================================
#  .github/workflows/daily-battles.yml
#  Daily Trend Battle Generator  |  GitHub Actions Workflow
# =============================================================================

name: Daily Battle Generator

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-battles:
    name: Generate Daily Trend Battles
    runs-on: ubuntu-latest

    # ── REQUIRED: allow the job to push commits back to the repo ───────────
    permissions:
      contents: write

    concurrency:
      group: daily-battle-generator
      cancel-in-progress: false

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the battle generator ────────────────────────────────────────
      - name: Run main.py
        run: python main.py

      # ── 5. Commit updated data.json ────────────────────────────────────────
      - name: Commit and push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          
          # Force-add data.json (works even if untracked or ignored)
          git add -f data.json
          
          # Always commit and push; || true prevents exit on "nothing to commit"
          git commit -m "chore: daily battle update $(date -u +'%Y-%m-%d')" || true
          git push origin HEAD || true
