# =============================================================================
#  .github/workflows/daily-battles.yml
#  Daily Trend Battle Generator  |  GitHub Actions Workflow
# =============================================================================

name: Daily Battle Generator

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-battles:
    name: Generate Daily Trend Battles
    runs-on: ubuntu-latest

    concurrency:
      group: daily-battle-generator
      cancel-in-progress: false

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the battle generator ────────────────────────────────────────
      - name: Run main.py
        run: python main.py

      # ── 5. Commit updated data.json ────────────────────────────────────────
      - name: Commit and push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          
          # إجبار إضافة الملف ورفعه لتحديث الموقع بشكل حتمي
          git add data.json || true
          git commit -m "chore: daily battle update $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
