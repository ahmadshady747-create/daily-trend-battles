# =============================================================================
#  .github/workflows/daily-battles.yml
#  Daily Trend Battle Generator + OG + Discord + Telegram + SEO Sitemap
# =============================================================================

name: Daily Battle Generator

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generate-battles:
    name: Generate Daily Trend Battles
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: daily-battle-generator
      cancel-in-progress: false

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the battle generator ────────────────────────────────────────
      - name: Run main.py
        env:
          # Discord
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Telegram
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_MY_CHAT_ID:   ${{ secrets.TELEGRAM_MY_CHAT_ID }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
          # SEO / Site
          SITE_URL:              ${{ secrets.SITE_URL }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
        run: python main.py

      # ── 5. Commit data.json + OG images + sitemap.xml ────────────────────
      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add -f data.json public/og/ public/sitemap.xml
          git commit -m "chore: daily battle update $(date -u +'%Y-%m-%d')" || true
          git push origin HEAD || true
