# =============================================================================
#  .github/workflows/daily-battles.yml
#  Daily Trend Battle Generator  |  GitHub Actions Workflow
# =============================================================================
#
#  HOW THIS WORKS
#  ──────────────
#  1. Runs automatically at 06:00 UTC every day (cron).
#  2. Checks out the repo, installs dependencies, runs main.py.
#  3. main.py fetches trends and writes a fresh data.json to the repo root.
#  4. This workflow commits the updated data.json back to main.
#  5. The commit triggers Vercel's GitHub integration → auto-deploy.
#
#  Can also be triggered manually via the GitHub Actions UI
#  ("Run workflow" button) for testing or emergency re-runs.
#
#  REQUIRED REPOSITORY SETTINGS
#  ─────────────────────────────
#  • Settings → Actions → General → Workflow permissions
#    Set to "Read and write permissions" so the bot can commit data.json.
#
#  NO SECRETS NEEDED — pytrends uses unauthenticated public endpoints.
# =============================================================================

name: Daily Battle Generator

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate-battles:
    name: Generate Daily Trend Battles
    runs-on: ubuntu-latest

    # Prevent two runs overlapping if a previous one is still in progress
    concurrency:
      group: daily-battle-generator
      cancel-in-progress: false

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git can detect file changes cleanly
          fetch-depth: 1

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip's download cache to speed up repeated runs
          cache: "pip"
          cache-dependency-path: requirements.txt

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the battle generator ────────────────────────────────────────
      - name: Run main.py
        run: python main.py

      # ── 5. Commit updated data.json ────────────────────────────────────────
      - name: Commit and push data.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          # Only commit if data.json actually changed
          if git diff --quiet data.json; then
            echo "data.json unchanged — nothing to commit."
          else
            git add data.json
            git commit -m "chore: daily battle update $(date -u +'%Y-%m-%d')"
            git push
            echo "data.json committed and pushed. Vercel deploy will trigger."
          fi
